services:
  - type: web
    name: app-laundry
    runtime: php
    repo: https://github.com/ruel-code/app-laundry
    branch: main
    buildCommand: |
      composer install --no-dev --optimize-autoloader
      npm install
      npm run build
      php artisan storage:link
    startCommand: php artisan serve --host=0.0.0.0 --port=10000
    healthCheckPath: /login
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: APP_URL
        value: https://app-laundry.onrender.com
      - key: APP_KEY
        generateValue: true
      - key: DB_CONNECTION
        value: sqlite
      - key: SESSION_DRIVER
        value: database
      - key: QUEUE_CONNECTION
        value: sync
      - key: CACHE_STORE
        value: database
      - key: LOG_LEVEL
        value: warning
      - key: PHP_OPCACHE_ENABLE
        value: "1"
